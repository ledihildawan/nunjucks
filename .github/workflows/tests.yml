name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - bun: 1.0
            os: windows-2022
          - bun: 1.0
            os: windows-2025
          - bun: 1.0
            os: ubuntu-22.04
          - bun: 1.1
            os: ubuntu-22.04
          - bun: 1.1
            os: macos-14
          - bun: latest
            os: ubuntu-latest
          - bun: latest
            os: macos-latest

    name: Test (bun-${{ matrix.bun }}/${{ matrix.os }})

    steps:
      - if: runner.os == 'Windows'
        run: git config --global core.autocrlf false && git config --global core.eol lf
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}
      - run: bun install
      - run: bun test
