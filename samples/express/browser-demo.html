<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error Classification Demo</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 2rem auto; padding: 1rem; }
    h1 { color: #333; }
    .card { background: #f5f5f5; padding: 1rem; border-radius: 8px; margin: 1rem 0; }
    button { background: #3b82f6; color: white; border: none; padding: 0.6rem 1rem; border-radius: 4px; cursor: pointer; margin: 0.25rem; font-size: 0.9rem; }
    button:hover { background: #2563eb; }
    .iframe-wrapper { 
      border: 2px solid #e5e7eb; 
      border-radius: 8px; 
      overflow: hidden; 
      min-height: 400px;
      background: white;
    }
    iframe { 
      width: 100%; 
      height: 500px; 
      border: none; 
    }
  </style>
</head>
<body>
  <h1>🧪 Error Classification Demo</h1>
  
  <p>Click buttons below to test server-side rendering with full error UI:</p>
  
  <div class="card">
    <h3>Test Cases</h3>
    <button onclick="loadContent('/home')">✅ Success - Valid Context</button>
    <button onclick="loadContent('/errors/undefined-variable')">❌ Undefined Variable</button>
    <button onclick="loadContent('/undefined/strict-nested')">❌ Nested Null</button>
    <button onclick="loadContent('/undefined/strict')">❌ Missing Context</button>
    <button onclick="loadContent('/errors/filter-error')">❌ Filter Error</button>
    <button onclick="loadContent('/errors/syntax-error')">❌ Syntax Error</button>
    <button onclick="loadContent('/errors/sandbox-proto')">❌ Sandbox Blocked</button>
    <button onclick="loadContent('/errors/slice-error')">❌ Slice Error</button>
  </div>

  <h3>Output:</h3>
  <div class="iframe-wrapper">
    <iframe id="output" sandbox="allow-same-origin"></iframe>
  </div>

  <script>
    function loadContent(url) {
      fetch(url)
        .then(resp => resp.text())
        .then(html => {
          const iframe = document.getElementById('output');
          const doc = iframe.contentDocument || iframe.contentWindow.document;
          doc.open();
          doc.write(html);
          doc.close();
        })
        .catch(err => {
          console.error('Error loading content:', err);
        });
    }
    
    // Load home page by default
    loadContent('/home');
  </script>
</body>
</html>
